<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>育智小学五年级听写练习</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(180deg, #fdf6e3 0%, #fbf0d9 55%, #eef2d6 100%);
    background-attachment: fixed;
    position: relative;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 55% 30% at 12% 102%, #cfe3ac 0%, transparent 72%),
      radial-gradient(ellipse 50% 28% at 88% 100%, #bfdd9e 0%, transparent 72%),
      radial-gradient(ellipse 65% 24% at 50% 108%, #aad48c 0%, transparent 78%),
      radial-gradient(circle at 90% 8%, rgba(255,214,120,.35) 0 60px, transparent 61px),
      radial-gradient(circle at 6% 6%, rgba(255,214,120,.28) 0 46px, transparent 47px);
  }
  .perspective-1000 { perspective: 1000px; }
  .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; }
  .flip-back { transform: rotateY(180deg); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeInUp 0.4s ease-out; }
  .blob-badge { border-radius: 44% 56% 50% 50% / 48% 42% 58% 52%; }
  .signpost-post {
    width: 11px;
    height: 30px;
    margin: -3px auto 0;
    background: linear-gradient(180deg, #b98a56, #8b5e34);
    border-radius: 0 0 3px 3px;
    box-shadow: inset -2px 0 2px rgba(0,0,0,.15);
  }
  .signpost-wave-up   { transform: translateY(-8px) rotate(-2deg); }
  .signpost-wave-down { transform: translateY(10px) rotate(2deg); }
  @media (max-width: 640px) {
    .signpost-wave-up, .signpost-wave-down { transform: none; }
  }
</style>
</head>
<body class="text-[#4a3822]">
<div id="app"></div>

<script>
/* ---------------- Audio utilities: browser-native Chinese TTS (no API key needed) ---------------- */
let cachedVoices = [];
function loadVoices() {
  cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
}
if (window.speechSynthesis) {
  loadVoices();
  // Voice list loads asynchronously in some browsers (esp. Chrome)
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function pickChineseVoice() {
  if (!cachedVoices.length) loadVoices();
  // Prefer Mandarin (zh-CN), fall back to any zh-* voice
  return cachedVoices.find(v => v.lang === 'zh-CN')
      || cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh'))
      || null;
}

function speakText(text, btn) {
  if (!text) return;
  if (!window.speechSynthesis) {
    console.error("Speech synthesis not supported in this browser.");
    return;
  }
  window.speechSynthesis.cancel(); // stop anything currently speaking
  const utterance = new SpeechSynthesisUtterance(text);
  const voice = pickChineseVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;

  if (btn) {
    btn.classList.add('animate-pulse');
    utterance.onend = () => btn.classList.remove('animate-pulse');
    utterance.onerror = () => btn.classList.remove('animate-pulse');
  }
  window.speechSynthesis.speak(utterance);
}

function playSound(type) {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const now = ctx.currentTime;
  switch (type) {
    case 'flip':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'correct':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'missed':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
  }
}


/* ---------------- State ---------------- */
const state = {
  currentLesson: null,
  view: 'selection',      // 'selection' | 'picker' | 'learn' | 'apply' | 'practice'
  subTab: 'vocab',         // 'vocab' | 'sentence'
  currentIndex: 0,
  isFlipped: false,
  isTransitioning: false,
  practiceQueue: [],
  practicePhase: 'tingxie', // 'tingxie' | 'moxie'
  isPracticeComplete: false,
  gameSelection: [],
  userSelection: [],

  // 词语应用 (fill-in-the-blank sentence practice) state
  applyQueue: [],          // [{word, blanked, fullSentence, english, answer}, ...]
  applyIndex: 0,
  applyFlipped: false,
  applyTransitioning: false,
  isApplyComplete: false,

  // Data-loading state
  lessonIndex: null,      // [{id, title}, ...] — loaded once for the homepage
  lessonCache: {},         // { [id]: full lesson object } — loaded on demand
  loadingIndex: false,
  loadingLesson: false,
  loadError: null,

  // Custom review (自由复习) state
  pickerSelectedIds: [],   // lesson ids checked in the picker screen
  isCustomReview: false,   // true while a pooled/random review session is active
  reviewVocabSample: [],   // the 20 (or fewer) randomly chosen vocab items for this session
  reviewSentenceSample: [], // the 5 (or fewer) randomly chosen sentences for this session
  reviewSentenceBank: {},  // merged sentenceBank of all selected lessons, keyed by word

  // Points / rewards system
  pointsLedger: [],        // [{id, timestamp, scopeLabel, activityLabel, points}, ...] — persisted to localStorage
  vocabFlippedIndices: new Set(), // card indices flipped at least once, this lesson-visit (学词语)
  vocabPointsAwardedThisVisit: false,
  sentenceSolvedIndices: new Set(), // sentence indices solved correctly, this lesson-visit (学默写)
  sentencePointsAwardedThisVisit: false,
  sentenceCheckResult: null // null | 'correct' | 'incorrect' — feedback for the current sentence-builder attempt
};

const POINTS_VOCAB_LEARN = 10;
const POINTS_SENTENCE_LEARN = 10;
const POINTS_APPLY = 10;
const POINTS_PRACTICE = 20;
const POINTS_STORAGE_KEY = 'chineseAppPointsLedger';

function loadPointsLedger() {
  try {
    const raw = localStorage.getItem(POINTS_STORAGE_KEY);
    state.pointsLedger = raw ? JSON.parse(raw) : [];
  } catch (err) {
    console.error('Failed to load points ledger', err);
    state.pointsLedger = [];
  }
}

function savePointsLedger() {
  try {
    localStorage.setItem(POINTS_STORAGE_KEY, JSON.stringify(state.pointsLedger));
  } catch (err) {
    console.error('Failed to save points ledger', err);
  }
}

function totalPoints() {
  return state.pointsLedger.reduce((sum, e) => sum + e.points, 0);
}

function currentScopeLabel() {
  return state.isCustomReview ? '自由复习' : `第${state.currentLesson}课`;
}

function awardPoints(activityLabel, points) {
  state.pointsLedger.push({
    id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
    timestamp: new Date().toISOString(),
    scopeLabel: currentScopeLabel(),
    activityLabel,
    points
  });
  savePointsLedger();
}

const REVIEW_VOCAB_COUNT = 20;
const REVIEW_SENTENCE_COUNT = 5;

const LESSONS_BASE_URL = 'lessons'; // folder of JSON files served alongside this HTML

async function loadLessonIndex() {
  if (state.lessonIndex || state.loadingIndex) return;
  state.loadingIndex = true;
  state.loadError = null;
  render();
  try {
    const res = await fetch(`${LESSONS_BASE_URL}/index.json`);
    if (!res.ok) throw new Error(`Failed to load lesson index (${res.status})`);
    state.lessonIndex = await res.json();
  } catch (err) {
    console.error(err);
    state.loadError = '课程列表加载失败，请检查网络连接。'; // "Failed to load lesson list"
  } finally {
    state.loadingIndex = false;
    render();
  }
}

async function loadLesson(num) {
  if (state.lessonCache[num]) return state.lessonCache[num]; // cache hit, no fetch
  state.loadingLesson = true;
  state.loadError = null;
  render();
  try {
    const res = await fetch(`${LESSONS_BASE_URL}/${num}.json`);
    if (!res.ok) throw new Error(`Failed to load lesson ${num} (${res.status})`);
    const data = await res.json();
    state.lessonCache[num] = data;
    return data;
  } catch (err) {
    console.error(err);
    state.loadError = '课程内容加载失败，请检查网络连接。'; // "Failed to load lesson content"
    return null;
  } finally {
    state.loadingLesson = false;
    render();
  }
}

function activeLessonData() { return state.currentLesson ? state.lessonCache[state.currentLesson] : null; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ---------------- Navigation / actions ---------------- */
function goSelection() {
  state.view = 'selection';
  state.isCustomReview = false;
  playSound('flip');
  render();
}

async function selectLesson(num) {
  state.isCustomReview = false;
  state.currentLesson = num;
  state.view = 'learn';
  state.subTab = 'vocab';
  state.currentIndex = 0;
  state.isFlipped = false;
  // Fresh lesson visit — reset 学习 completion tracking so points can be earned again
  state.vocabFlippedIndices = new Set();
  state.vocabPointsAwardedThisVisit = false;
  state.sentenceSolvedIndices = new Set();
  state.sentencePointsAwardedThisVisit = false;
  state.sentenceCheckResult = null;
  playSound('flip');
  await loadLesson(num); // renders a loading state itself, then re-renders when done
}

function openRewardCard() {
  state.view = 'rewardCard';
  playSound('flip');
  render();
}

function downloadRewardCard() {
  const ledger = state.pointsLedger;
  if (ledger.length === 0) return;

  const width = 800;
  const lineHeight = 46;
  const headerHeight = 260;
  const footerHeight = 110;
  const height = headerHeight + ledger.length * lineHeight + footerHeight;

  const canvas = document.createElement('canvas');
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, 0, height);
  grad.addColorStop(0, '#fdf6e3');
  grad.addColorStop(1, '#f2e2b8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, width, height);

  // Border
  ctx.strokeStyle = '#e8c873';
  ctx.lineWidth = 8;
  ctx.strokeRect(4, 4, width - 8, height - 8);

  // Title
  const now = new Date();
  const dateStr = now.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  ctx.textAlign = 'center';
  ctx.fillStyle = '#7a5230';
  ctx.font = 'bold 42px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillText('学习奖励卡', width / 2, 80);

  ctx.font = 'bold 18px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#a67c4e';
  ctx.fillText(`领取时间：${dateStr}`, width / 2, 115);

  // Total
  ctx.font = 'bold 56px "Microsoft YaHei", "PingFang SC", sans-serif';
  ctx.fillStyle = '#c96a3e';
  ctx.fillText(`总积分：${totalPoints()} 分`, width / 2, 190);

  // Divider
  ctx.strokeStyle = '#e0be7a';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, headerHeight - 20);
  ctx.lineTo(width - 60, headerHeight - 20);
  ctx.stroke();

  // Itemized list
  let y = headerHeight + 20;
  ledger.forEach(e => {
    const time = new Date(e.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    ctx.textAlign = 'left';
    ctx.fillStyle = '#4a3822';
    ctx.font = 'bold 20px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillText(`${e.scopeLabel} · ${e.activityLabel}`, 60, y);
    ctx.fillStyle = '#a67c4e';
    ctx.font = '14px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillText(time, 60, y + 20);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#059669';
    ctx.font = 'bold 20px "Microsoft YaHei", "PingFang SC", sans-serif';
    ctx.fillText(`+${e.points}`, width - 60, y);
    y += lineHeight;
  });

  // Footer flourish
  ctx.textAlign = 'center';
  ctx.font = '44px sans-serif';
  ctx.fillText('🦊 🌟 🎉', width / 2, height - 35);

  const filename = `学习奖励卡_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.png`;

  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    // Points reset only after a successful download, so nothing is lost if it's cancelled/fails
    state.pointsLedger = [];
    savePointsLedger();
    playSound('correct');
    render();
  }, 'image/png');
}

function openPicker() {
  state.view = 'picker';
  playSound('flip');
  render();
}

function togglePickerLesson(id) {
  if (state.pickerSelectedIds.includes(id)) {
    state.pickerSelectedIds = state.pickerSelectedIds.filter(x => x !== id);
  } else {
    state.pickerSelectedIds = [...state.pickerSelectedIds, id];
  }
  playSound('flip');
  render();
}

function togglePickerAll() {
  const allIds = state.lessonIndex.map(l => l.id);
  const allSelected = allIds.every(id => state.pickerSelectedIds.includes(id));
  state.pickerSelectedIds = allSelected ? [] : allIds;
  playSound('flip');
  render();
}

async function startCustomReview() {
  if (state.pickerSelectedIds.length === 0) return;
  state.isCustomReview = true;
  state.currentLesson = null;
  state.view = 'practice';
  playSound('flip');
  render(); // shows the loading screen via renderCustomReviewScreen while fetches are in flight
  await Promise.all(state.pickerSelectedIds.map(id => loadLesson(id)));

  const missing = state.pickerSelectedIds.filter(id => !state.lessonCache[id]);
  if (missing.length > 0) {
    render(); // loadError is already set by loadLesson; renderCustomReviewScreen() will show it
    return;
  }

  const allVocab = state.pickerSelectedIds.flatMap(id => state.lessonCache[id].vocab);
  const allSentences = state.pickerSelectedIds.flatMap(id => state.lessonCache[id].sentences);
  state.reviewVocabSample = shuffle(allVocab).slice(0, Math.min(REVIEW_VOCAB_COUNT, allVocab.length));
  state.reviewSentenceSample = shuffle(allSentences).slice(0, Math.min(REVIEW_SENTENCE_COUNT, allSentences.length));
  state.reviewSentenceBank = {};
  state.pickerSelectedIds.forEach(id => {
    Object.assign(state.reviewSentenceBank, state.lessonCache[id].sentenceBank || {});
  });
  startPractice();
}

function goLearn() {
  state.view = 'learn';
  playSound('flip');
  render();
}

function setSubTab(tab) {
  state.subTab = tab;
  state.currentIndex = 0;
  state.isFlipped = false;
  playSound('flip');
  if (tab === 'sentence') setupSentenceGame();
  render();
}

function toggleFlip() {
  if (state.isTransitioning) return;
  state.isFlipped = !state.isFlipped;
  playSound('flip');

  // Track 学词语 completion — flipped at least once, per card. Only counts in 学习/学词语,
  // not during 听写练习 (which reuses this same toggleFlip function for its own flip card).
  if (state.isFlipped && state.view === 'learn' && state.subTab === 'vocab' && !state.isCustomReview) {
    state.vocabFlippedIndices.add(state.currentIndex);
    const total = activeLessonData().vocab.length;
    if (!state.vocabPointsAwardedThisVisit && state.vocabFlippedIndices.size >= total) {
      state.vocabPointsAwardedThisVisit = true;
      awardPoints('学习(学词语)', POINTS_VOCAB_LEARN);
    }
  }

  render();
  maybeAutoSpeak();
}

function handleNext() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex + 1) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

function handlePrev() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex - 1 + data.length) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

const SENTENCE_PUNCTUATION = new Set(['。', '，', '：', '！', '？', '“', '”', '、', '；']);

function setupSentenceGame() {
  const sentence = activeLessonData().sentences[state.currentIndex];
  state.gameSelection = shuffle(sentence.segments.filter(s => !SENTENCE_PUNCTUATION.has(s)));
  state.userSelection = [];
  state.sentenceCheckResult = null;
}

function resetLearnSentence() {
  setupSentenceGame();
  playSound('flip');
  render();
}

function pickSegment(word, idx) {
  state.userSelection = [...state.userSelection, word];
  state.gameSelection = state.gameSelection.filter((w, i) => !(w === word && i === idx));

  if (state.gameSelection.length === 0) {
    // All pieces placed — check whether the order is actually correct.
    const sentence = activeLessonData().sentences[state.currentIndex];
    const correctOrder = sentence.segments.filter(s => !SENTENCE_PUNCTUATION.has(s));
    const isCorrect = correctOrder.length === state.userSelection.length &&
      correctOrder.every((seg, i) => seg === state.userSelection[i]);
    state.sentenceCheckResult = isCorrect ? 'correct' : 'incorrect';
    playSound(isCorrect ? 'correct' : 'missed');

    if (isCorrect && !state.isCustomReview) {
      state.sentenceSolvedIndices.add(state.currentIndex);
      const total = activeLessonData().sentences.length;
      if (!state.sentencePointsAwardedThisVisit && state.sentenceSolvedIndices.size >= total) {
        state.sentencePointsAwardedThisVisit = true;
        awardPoints('学习(学默写)', POINTS_SENTENCE_LEARN);
      }
    }
  } else {
    playSound('flip');
  }

  render();
}

/* ---------------- Practice mode ---------------- */
function startPractice() {
  const vocabSource = state.isCustomReview ? state.reviewVocabSample : activeLessonData().vocab;
  const vocab = shuffle(vocabSource).map(item => ({ ...item, type: 'vocab' }));
  state.practiceQueue = vocab;
  state.practicePhase = 'tingxie';
  state.currentIndex = 0;
  state.isFlipped = false;
  state.isPracticeComplete = false;
  state.view = 'practice';
  playSound('flip');
  render();
  maybeAutoSpeak();
}

function startSentencePractice() {
  const sentenceSource = state.isCustomReview ? state.reviewSentenceSample : activeLessonData().sentences;
  state.practiceQueue = sentenceSource.map(item => ({ ...item, type: 'sentence' }));
  state.practicePhase = 'moxie';
  state.currentIndex = 0;
  state.isFlipped = false;
}

function moveNextInPractice(onPhaseEnd) {
  const advance = () => {
    if (state.currentIndex < state.practiceQueue.length - 1) {
      state.currentIndex += 1;
    } else {
      onPhaseEnd();
    }
    state.isTransitioning = false;
    render();
    maybeAutoSpeak();
  };
  if (state.isFlipped) {
    state.isFlipped = false;
    state.isTransitioning = true;
    render();
    setTimeout(advance, 500);
  } else {
    advance();
  }
}

function handlePracticeCorrect() {
  playSound('correct');
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') {
      startSentencePractice();
      if (state.practiceQueue.length === 0) state.isPracticeComplete = true; // no sentences pooled — skip straight to done
    } else {
      state.isPracticeComplete = true;
    }
    if (state.isPracticeComplete) awardPoints('听写练习', POINTS_PRACTICE);
  });
}

function handlePracticeMissed() {
  playSound('missed');
  const currentItem = state.practiceQueue[state.currentIndex];
  state.practiceQueue = [...state.practiceQueue, currentItem];
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') {
      startSentencePractice();
      if (state.practiceQueue.length === 0) state.isPracticeComplete = true;
    } else {
      state.isPracticeComplete = true;
    }
    if (state.isPracticeComplete) awardPoints('听写练习', POINTS_PRACTICE);
  });
}


function maybeAutoSpeak() {
  if (state.view === 'practice' && state.practicePhase === 'tingxie' &&
      state.practiceQueue[state.currentIndex] && !state.isFlipped && !state.isTransitioning) {
    speakText(state.practiceQueue[state.currentIndex].word);
  }
}

/* ---------------- 词语应用 (fill-in-the-blank sentence practice) ---------------- */
function blankWord(sentence, word) {
  const idx = sentence.indexOf(word);
  if (idx === -1) return sentence; // shouldn't happen — bank sentences are authored per-word
  return sentence.slice(0, idx) + '____' + sentence.slice(idx + word.length);
}

function startApplyPractice() {
  const vocabSource = state.isCustomReview ? state.reviewVocabSample : activeLessonData().vocab;
  const bank = state.isCustomReview ? state.reviewSentenceBank : (activeLessonData().sentenceBank || {});

  const applicable = vocabSource.filter(v => bank[v.word] && bank[v.word].length > 0);
  const queue = shuffle(applicable).map(v => {
    const options = bank[v.word];
    const chosen = options[Math.floor(Math.random() * options.length)];
    return {
      word: v.word,
      fullSentence: chosen.zh,
      blanked: blankWord(chosen.zh, v.word),
      english: chosen.en,
      answer: v.word
    };
  });

  state.applyQueue = queue;
  state.applyIndex = 0;
  state.applyFlipped = false;
  state.isApplyComplete = false;
  state.view = 'apply';
  playSound('flip');
  render();
}

function toggleApplyFlip() {
  if (state.applyTransitioning) return;
  state.applyFlipped = !state.applyFlipped;
  playSound('flip');
  render();
}

function moveNextInApply() {
  const advance = () => {
    if (state.applyIndex < state.applyQueue.length - 1) {
      state.applyIndex += 1;
    } else {
      state.isApplyComplete = true;
      awardPoints('词语应用', POINTS_APPLY);
    }
    state.applyTransitioning = false;
    render();
  };
  if (state.applyFlipped) {
    state.applyFlipped = false;
    state.applyTransitioning = true;
    render();
    setTimeout(advance, 500);
  } else {
    advance();
  }
}

function handleApplyCorrect() {
  playSound('correct');
  moveNextInApply();
}

function handleApplyMissed() {
  playSound('missed');
  const currentItem = state.applyQueue[state.applyIndex];
  state.applyQueue = [...state.applyQueue, currentItem];
  moveNextInApply();
}

/* ---------------- Icon helper ---------------- */
function icon(name, cls) {
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

/* ---------------- Render ---------------- */
function render() {
  const app = document.getElementById('app');
  let html;
  if (state.view === 'selection') html = renderSelection();
  else if (state.view === 'picker') html = renderPicker();
  else if (state.view === 'rewardCard') html = renderRewardCard();
  else if ((state.view === 'practice' || state.view === 'apply') && state.isCustomReview) html = renderCustomReviewScreen();
  else html = renderLesson();
  app.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

      <div class="p-8 bg-sky-50 rounded-full mb-6 ring-8 ring-sky-50/50">${icon(s.icon, 'w-16 h-16 ' + s.color)}</div>
      <p class="text-sky-300 text-[10px] font-black tracking-[0.4em] mb-2 uppercase">场景</p>
      <p class="text-amber-700 text-center text-lg font-bold italic px-4">${s.description}</p>
    </div>
    ${progressBadge}
    <div class="min-h-[120px] mb-8 p-6 rounded-[2rem] border-4 border-dashed flex flex-wrap gap-2 items-center justify-center transition-colors ${trayBorder}">${userChips}</div>
    ${resultMessage}
    <div class="flex flex-wrap gap-3 justify-center mb-10">${options}</div>
    <div class="flex justify-between items-center pt-8 border-t border-sky-100">
      <button onclick="resetLearnSentence()" class="text-amber-700 hover:text-sky-600 flex items-center gap-2 font-black text-xs tracking-widest">${icon('rotate-cw','w-4 h-4')} 重置</button>
      <button onclick="toggleFlip()" class="text-white font-black text-xs tracking-widest px-4 py-2 rounded-full shadow-[0_4px_0_#0369a1] hover:shadow-[0_2px_0_#0369a1] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all uppercase" style="background:linear-gradient(135deg,#e8a33d,#c96a3e);">${state.isFlipped ? '隐藏答案' : '显示答案'}</button>
    </div>
    ${state.isFlipped ? `
    <div class="mt-8 flex flex-col items-center gap-4 animate-in">
      <p class="text-center text-3xl font-black text-sky-600 leading-relaxed">${s.text}</p>
      <button onclick="speakText('${s.text.replace(/'/g,"\\'")}', this)" class="p-3 rounded-full bg-sky-100 text-sky-600 hover:bg-sky-200 transition-all">${icon('volume-2','w-6 h-6')}</button>
    </div>` : ''}
  </div>`;
}

function renderPractice() {
  if (state.isPracticeComplete) {
    return `
    <div class="flex flex-col items-center min-h-[550px]">
      <div class="relative w-full bg-white rounded-[3rem] p-16 text-center shadow-lg flex flex-col items-center border-4 border-white overflow-hidden">
        <span class="absolute left-6 top-5 text-4xl">🎊</span>
        <span class="absolute right-7 top-8 text-3xl rotate-6">✨</span>
        <span class="absolute right-6 bottom-6 text-4xl -rotate-6">🎉</span>
        <div class="w-32 h-32 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-8">${icon('check','w-16 h-16')}</div>
        <h2 class="text-4xl font-black text-amber-900 mb-4 tracking-tighter">练习完成! 🌟</h2>
        <p class="text-amber-700 font-bold mb-10 text-lg">${state.isCustomReview ? '做得好! 你已经完成了这次自由复习。' : `做得好! 你已经掌握了第 ${state.currentLesson} 课。`}</p>
        <div class="flex gap-4">
          <button onclick="goSelection()" class="px-8 py-4 bg-amber-50 text-amber-700 rounded-2xl font-black uppercase text-sm tracking-widest shadow-[0_4px_0_#f2e2b8] hover:shadow-[0_2px_0_#f2e2b8] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all">选择课次</button>
          <button onclick="${state.isCustomReview ? 'startCustomReview()' : 'startPractice()'}" class="px-8 py-4 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-[0_4px_0_#9c6b2e] hover:shadow-[0_2px_0_#9c6b2e] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all" style="background:linear-gradient(135deg,#e8a33d,#c96a3e);">重新开始</button>
        </div>
      </div>
    </div>`;
  }

  const item = state.practiceQueue[state.currentIndex];
  const front = state.practicePhase === 'tingxie'
    ? `<div class="text-center">
         <p class="text-5xl font-black text-amber-700 mb-4 tracking-tight">${item?.pinyin || ''}</p>
         <p class="text-2xl text-amber-700 italic font-bold">${item?.meaning || ''}</p>
       </div>`
    : `<div class="flex flex-col items-center text-center">
         <div class="p-8 bg-amber-50 rounded-full mb-8 ring-8 ring-amber-50">${icon(item?.icon, 'w-16 h-16 ' + (item?.color || ''))}</div>
         <p class="text-xl text-amber-700 font-black tracking-tight leading-snug">${item?.description || ''}</p>
       </div>`;
  const back = state.practicePhase === 'tingxie'
    ? `<span class="text-white font-black leading-tight text-center text-9xl tracking-tighter">${item?.word || ''}</span>`
    : `<span class="text-white font-black leading-tight text-center text-4xl">${item?.text || ''}</span>`;

  return `
  <div class="flex flex-col items-center min-h-[550px]">
    <div class="w-full mb-8 flex justify-between items-end">
      <div>
        <span class="text-[10px] font-black text-amber-700 uppercase tracking-[0.4em] block mb-1">练习阶段</span>
        <h2 class="text-3xl font-black text-amber-900">${state.practicePhase === 'tingxie' ? '🧩 听写测试' : '📝 默写测试'}</h2>
      </div>
      <div class="bg-amber-50 px-4 py-2 rounded-2xl">
        <span class="text-[10px] font-black text-amber-700 uppercase tracking-widest block text-right mb-1">进度</span>
        <p class="text-2xl font-black text-amber-700">${state.currentIndex + 1} / ${state.practiceQueue.length}</p>
      </div>
    </div>

    <div onclick="toggleFlip()" class="w-full max-w-sm lg:max-w-md aspect-[4/5] cursor-pointer perspective-1000 relative">
      <div class="flip-inner ${state.isFlipped ? 'flipped' : ''}" style="width:100%;height:100%;">
        <div class="flip-face backface-hidden rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-12 border-4 border-white overflow-hidden" style="background:linear-gradient(145deg,#fff 0%,#fff9d9 100%);">
          <span class="absolute left-6 top-4 text-4xl opacity-30" style="color:#ffbc43;">✦</span>
          <span class="absolute right-6 bottom-4 text-4xl rotate-6">🍭</span>
          ${front}
          <p class="absolute bottom-12 text-amber-700 font-black text-[10px] tracking-[0.4em] uppercase">点击查看答案</p>
        </div>
        <div class="flip-face flip-back backface-hidden rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-12 border-4 border-white/60 overflow-hidden" style="background:linear-gradient(145deg,#e8a33d 0%,#d97a3f 46%,#c96a3e 100%);">
          <span class="absolute left-6 top-4 text-4xl">🎉</span>
          <span class="absolute right-7 bottom-5 text-4xl">⭐</span>
          ${back}
        </div>
      </div>
    </div>

    <div class="w-full max-w-sm lg:max-w-md grid grid-cols-2 gap-6 mt-12">
      <button onclick="event.stopPropagation(); handlePracticeMissed()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl text-rose-400 shadow-[0_6px_0_#ffc9d1] hover:shadow-[0_4px_0_#ffc9d1] hover:translate-y-[2px] active:shadow-none active:translate-y-[6px] transition-all group">
        ${icon('x','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记错了</span>
      </button>
      <button onclick="event.stopPropagation(); handlePracticeCorrect()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl text-emerald-500 shadow-[0_6px_0_#a7f3d0] hover:shadow-[0_4px_0_#a7f3d0] hover:translate-y-[2px] active:shadow-none active:translate-y-[6px] transition-all group">
        ${icon('check','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记住了</span>
      </button>
    </div>
  </div>`;
}

function renderApplyCard() {
  if (state.applyQueue.length === 0) {
    return `
    <div class="flex flex-col items-center justify-center min-h-[400px] text-center gap-4">
      <span class="text-5xl">📭</span>
      <p class="text-amber-700 font-bold max-w-xs">${state.isCustomReview ? '所选课次暂无词语应用内容，请选择其他课次或稍后再试。' : '该课次的词语应用内容还在准备中，敬请期待。'}</p>
      <button onclick="goSelection()" class="px-6 py-3 bg-amber-400 text-white rounded-2xl font-black text-sm hover:bg-amber-500 transition-all">返回选择课次</button>
    </div>`;
  }

  if (state.isApplyComplete) {
    return `
    <div class="flex flex-col items-center min-h-[550px]">
      <div class="relative w-full bg-white rounded-[3rem] p-16 text-center shadow-lg flex flex-col items-center border-4 border-white overflow-hidden">
        <span class="absolute left-6 top-5 text-4xl">🎊</span>
        <span class="absolute right-7 top-8 text-3xl rotate-6">✨</span>
        <span class="absolute right-6 bottom-6 text-4xl -rotate-6">🎉</span>
        <div class="w-32 h-32 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-8">${icon('check','w-16 h-16')}</div>
        <h2 class="text-4xl font-black text-amber-900 mb-4 tracking-tighter">词语应用完成! 🌟</h2>
        <p class="text-amber-700 font-bold mb-10 text-lg">${state.isCustomReview ? '做得好! 你已经完成了这次自由复习的词语应用。' : `做得好! 你已经完成了第 ${state.currentLesson} 课的词语应用。`}</p>
        <div class="flex gap-4">
          <button onclick="goSelection()" class="px-8 py-4 bg-amber-50 text-amber-700 rounded-2xl font-black uppercase text-sm tracking-widest shadow-[0_4px_0_#f2e2b8] hover:shadow-[0_2px_0_#f2e2b8] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all">选择课次</button>
          <button onclick="startApplyPractice()" class="px-8 py-4 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-[0_4px_0_#0d9488] hover:shadow-[0_2px_0_#0d9488] hover:translate-y-[2px] active:shadow-none active:translate-y-[4px] transition-all" style="background:linear-gradient(135deg,#10b981,#0ea5e9);">重新开始</button>
        </div>
      </div>
    </div>`;
  }

  const item = state.applyQueue[state.applyIndex];

  return `
  <div class="flex flex-col items-center min-h-[550px]">
    <div class="w-full mb-8 flex justify-between items-end">
      <div>
        <span class="text-[10px] font-black text-amber-700 uppercase tracking-[0.4em] block mb-1">练习阶段</span>
        <h2 class="text-3xl font-black text-amber-900">🧠 词语应用</h2>
      </div>
      <div class="bg-amber-50 px-4 py-2 rounded-2xl">
        <span class="text-[10px] font-black text-amber-700 uppercase tracking-widest block text-right mb-1">进度</span>
        <p class="text-2xl font-black text-amber-700">${state.applyIndex + 1} / ${state.applyQueue.length}</p>
      </div>
    </div>

    <div onclick="toggleApplyFlip()" class="w-full max-w-md lg:max-w-lg aspect-[4/5] cursor-pointer perspective-1000 relative">
      <div class="flip-inner ${state.applyFlipped ? 'flipped' : ''}" style="width:100%;height:100%;">
        <div class="flip-face backface-hidden rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-10 border-4 border-white overflow-hidden" style="background:linear-gradient(145deg,#ecfdf5 0%,#d1fae5 100%);">
          <span class="absolute left-6 top-4 text-4xl opacity-30" style="color:#10b981;">✎</span>
          <span class="absolute right-6 bottom-4 text-4xl rotate-6">🌿</span>
          <p class="text-2xl md:text-3xl font-black text-emerald-800 leading-relaxed text-center px-2">${item.blanked}</p>
          <button onclick="event.stopPropagation(); speakText('${item.fullSentence.replace(/'/g, "\\'")}', this)" class="mt-6 p-3 rounded-full bg-emerald-100 text-emerald-600 hover:bg-emerald-200 transition-all">${icon('volume-2','w-6 h-6')}</button>
          <p class="mt-6 text-base text-emerald-500 italic font-bold text-center px-2">${item.english}</p>
          <p class="absolute bottom-8 text-emerald-300 font-black text-[10px] tracking-[0.4em] uppercase">点击查看答案</p>
        </div>
        <div class="flip-face flip-back backface-hidden rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-10 border-4 border-white/60 overflow-hidden" style="background:linear-gradient(145deg,#10b981 0%,#0ea5e9 100%);">
          <span class="absolute left-6 top-4 text-4xl">🎉</span>
          <span class="absolute right-7 bottom-5 text-4xl">⭐</span>
          <span class="text-6xl font-black text-white tracking-tight mb-6">${item.answer}</span>
          <button onclick="event.stopPropagation(); speakText('${item.answer.replace(/'/g, "\\'")}', this)" class="p-3 rounded-full bg-white/20 text-white hover:bg-white/30 transition-all">${icon('volume-2','w-6 h-6')}</button>
        </div>
      </div>
    </div>

    <div class="w-full max-w-md lg:max-w-lg grid grid-cols-2 gap-6 mt-12">
      <button onclick="event.stopPropagation(); handleApplyMissed()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl text-rose-400 shadow-[0_6px_0_#ffc9d1] hover:shadow-[0_4px_0_#ffc9d1] hover:translate-y-[2px] active:shadow-none active:translate-y-[6px] transition-all group">
        ${icon('x','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">答错了</span>
      </button>
      <button onclick="event.stopPropagation(); handleApplyCorrect()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl text-emerald-500 shadow-[0_6px_0_#a7f3d0] hover:shadow-[0_4px_0_#a7f3d0] hover:translate-y-[2px] active:shadow-none active:translate-y-[6px] transition-all group">
        ${icon('check','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">答对了</span>
      </button>
    </div>
  </div>`;
}

/* ---------------- Init ---------------- */
loadPointsLedger();
render();
</script>
</body>
</html>
