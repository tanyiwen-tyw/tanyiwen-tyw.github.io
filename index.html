<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华文学习平台</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  .perspective-1000 { perspective: 1000px; }
  .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
  .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; }
  .flip-back { transform: rotateY(180deg); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }
  .animate-in { animation: fadeInUp 0.4s ease-out; }
</style>
</head>
<body class="bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 text-slate-900">
<div id="app"></div>

<script>
/* ---------------- Audio utilities: browser-native Chinese TTS (no API key needed) ---------------- */
let cachedVoices = [];
function loadVoices() {
  cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
}
if (window.speechSynthesis) {
  loadVoices();
  // Voice list loads asynchronously in some browsers (esp. Chrome)
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function pickChineseVoice() {
  if (!cachedVoices.length) loadVoices();
  // Prefer Mandarin (zh-CN), fall back to any zh-* voice
  return cachedVoices.find(v => v.lang === 'zh-CN')
      || cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh'))
      || null;
}

function speakText(text, btn) {
  if (!text) return;
  if (!window.speechSynthesis) {
    console.error("Speech synthesis not supported in this browser.");
    return;
  }
  window.speechSynthesis.cancel(); // stop anything currently speaking
  const utterance = new SpeechSynthesisUtterance(text);
  const voice = pickChineseVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;

  if (btn) {
    btn.classList.add('animate-pulse');
    utterance.onend = () => btn.classList.remove('animate-pulse');
    utterance.onerror = () => btn.classList.remove('animate-pulse');
  }
  window.speechSynthesis.speak(utterance);
}

function playSound(type) {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const now = ctx.currentTime;
  switch (type) {
    case 'flip':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'correct':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'missed':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
  }
}


/* ---------------- State ---------------- */
const state = {
  currentLesson: null,
  view: 'selection',      // 'selection' | 'picker' | 'learn' | 'practice'
  subTab: 'vocab',         // 'vocab' | 'sentence'
  currentIndex: 0,
  isFlipped: false,
  isTransitioning: false,
  practiceQueue: [],
  practicePhase: 'tingxie', // 'tingxie' | 'moxie'
  isPracticeComplete: false,
  gameSelection: [],
  userSelection: [],

  // Data-loading state
  lessonIndex: null,      // [{id, title}, ...] — loaded once for the homepage
  lessonCache: {},         // { [id]: full lesson object } — loaded on demand
  loadingIndex: false,
  loadingLesson: false,
  loadError: null,

  // Custom review (自由复习) state
  pickerSelectedIds: [],   // lesson ids checked in the picker screen
  isCustomReview: false,   // true while a pooled/random review session is active
  reviewVocabSample: [],   // the 20 (or fewer) randomly chosen vocab items for this session
  reviewSentenceSample: [] // the 5 (or fewer) randomly chosen sentences for this session
};

const REVIEW_VOCAB_COUNT = 20;
const REVIEW_SENTENCE_COUNT = 5;

const LESSONS_BASE_URL = 'lessons'; // folder of JSON files served alongside this HTML

async function loadLessonIndex() {
  if (state.lessonIndex || state.loadingIndex) return;
  state.loadingIndex = true;
  state.loadError = null;
  render();
  try {
    const res = await fetch(`${LESSONS_BASE_URL}/index.json`);
    if (!res.ok) throw new Error(`Failed to load lesson index (${res.status})`);
    state.lessonIndex = await res.json();
  } catch (err) {
    console.error(err);
    state.loadError = '课程列表加载失败，请检查网络连接。'; // "Failed to load lesson list"
  } finally {
    state.loadingIndex = false;
    render();
  }
}

async function loadLesson(num) {
  if (state.lessonCache[num]) return state.lessonCache[num]; // cache hit, no fetch
  state.loadingLesson = true;
  state.loadError = null;
  render();
  try {
    const res = await fetch(`${LESSONS_BASE_URL}/${num}.json`);
    if (!res.ok) throw new Error(`Failed to load lesson ${num} (${res.status})`);
    const data = await res.json();
    state.lessonCache[num] = data;
    return data;
  } catch (err) {
    console.error(err);
    state.loadError = '课程内容加载失败，请检查网络连接。'; // "Failed to load lesson content"
    return null;
  } finally {
    state.loadingLesson = false;
    render();
  }
}

function activeLessonData() { return state.currentLesson ? state.lessonCache[state.currentLesson] : null; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ---------------- Navigation / actions ---------------- */
function goSelection() {
  state.view = 'selection';
  state.isCustomReview = false;
  playSound('flip');
  render();
}

async function selectLesson(num) {
  state.isCustomReview = false;
  state.currentLesson = num;
  state.view = 'learn';
  state.subTab = 'vocab';
  state.currentIndex = 0;
  state.isFlipped = false;
  playSound('flip');
  await loadLesson(num); // renders a loading state itself, then re-renders when done
}

function openPicker() {
  state.view = 'picker';
  playSound('flip');
  render();
}

function togglePickerLesson(id) {
  if (state.pickerSelectedIds.includes(id)) {
    state.pickerSelectedIds = state.pickerSelectedIds.filter(x => x !== id);
  } else {
    state.pickerSelectedIds = [...state.pickerSelectedIds, id];
  }
  playSound('flip');
  render();
}

function togglePickerAll() {
  const allIds = state.lessonIndex.map(l => l.id);
  const allSelected = allIds.every(id => state.pickerSelectedIds.includes(id));
  state.pickerSelectedIds = allSelected ? [] : allIds;
  playSound('flip');
  render();
}

async function startCustomReview() {
  if (state.pickerSelectedIds.length === 0) return;
  state.isCustomReview = true;
  state.currentLesson = null;
  state.view = 'practice';
  playSound('flip');
  render(); // shows the loading screen via renderCustomReviewScreen while fetches are in flight
  await Promise.all(state.pickerSelectedIds.map(id => loadLesson(id)));

  const missing = state.pickerSelectedIds.filter(id => !state.lessonCache[id]);
  if (missing.length > 0) {
    render(); // loadError is already set by loadLesson; renderCustomReviewScreen() will show it
    return;
  }

  const allVocab = state.pickerSelectedIds.flatMap(id => state.lessonCache[id].vocab);
  const allSentences = state.pickerSelectedIds.flatMap(id => state.lessonCache[id].sentences);
  state.reviewVocabSample = shuffle(allVocab).slice(0, Math.min(REVIEW_VOCAB_COUNT, allVocab.length));
  state.reviewSentenceSample = shuffle(allSentences).slice(0, Math.min(REVIEW_SENTENCE_COUNT, allSentences.length));
  startPractice();
}

function goLearn() {
  state.view = 'learn';
  playSound('flip');
  render();
}

function setSubTab(tab) {
  state.subTab = tab;
  state.currentIndex = 0;
  state.isFlipped = false;
  playSound('flip');
  if (tab === 'sentence') setupSentenceGame();
  render();
}

function toggleFlip() {
  if (state.isTransitioning) return;
  state.isFlipped = !state.isFlipped;
  playSound('flip');
  render();
  maybeAutoSpeak();
}

function handleNext() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex + 1) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

function handlePrev() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex - 1 + data.length) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

function setupSentenceGame() {
  const sentence = activeLessonData().sentences[state.currentIndex];
  const punctuation = new Set(['。', '，', '：', '！', '？', '“', '”', '、', '；']);
  state.gameSelection = shuffle(sentence.segments.filter(s => !punctuation.has(s)));
  state.userSelection = [];
}

function resetLearnSentence() {
  setupSentenceGame();
  playSound('flip');
  render();
}

function pickSegment(word, idx) {
  state.userSelection = [...state.userSelection, word];
  state.gameSelection = state.gameSelection.filter((w, i) => !(w === word && i === idx));
  playSound('flip');
  render();
}

/* ---------------- Practice mode ---------------- */
function startPractice() {
  const vocabSource = state.isCustomReview ? state.reviewVocabSample : activeLessonData().vocab;
  const vocab = shuffle(vocabSource).map(item => ({ ...item, type: 'vocab' }));
  state.practiceQueue = vocab;
  state.practicePhase = 'tingxie';
  state.currentIndex = 0;
  state.isFlipped = false;
  state.isPracticeComplete = false;
  state.view = 'practice';
  playSound('flip');
  render();
  maybeAutoSpeak();
}

function startSentencePractice() {
  const sentenceSource = state.isCustomReview ? state.reviewSentenceSample : activeLessonData().sentences;
  state.practiceQueue = sentenceSource.map(item => ({ ...item, type: 'sentence' }));
  state.practicePhase = 'moxie';
  state.currentIndex = 0;
  state.isFlipped = false;
}

function moveNextInPractice(onPhaseEnd) {
  const advance = () => {
    if (state.currentIndex < state.practiceQueue.length - 1) {
      state.currentIndex += 1;
    } else {
      onPhaseEnd();
    }
    state.isTransitioning = false;
    render();
    maybeAutoSpeak();
  };
  if (state.isFlipped) {
    state.isFlipped = false;
    state.isTransitioning = true;
    render();
    setTimeout(advance, 500);
  } else {
    advance();
  }
}

function handlePracticeCorrect() {
  playSound('correct');
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') {
      startSentencePractice();
      if (state.practiceQueue.length === 0) state.isPracticeComplete = true; // no sentences pooled — skip straight to done
    } else {
      state.isPracticeComplete = true;
    }
  });
}

function handlePracticeMissed() {
  playSound('missed');
  const currentItem = state.practiceQueue[state.currentIndex];
  state.practiceQueue = [...state.practiceQueue, currentItem];
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') {
      startSentencePractice();
      if (state.practiceQueue.length === 0) state.isPracticeComplete = true;
    } else {
      state.isPracticeComplete = true;
    }
  });
}


function maybeAutoSpeak() {
  if (state.view === 'practice' && state.practicePhase === 'tingxie' &&
      state.practiceQueue[state.currentIndex] && !state.isFlipped && !state.isTransitioning) {
    speakText(state.practiceQueue[state.currentIndex].word);
  }
}

/* ---------------- Icon helper ---------------- */
function icon(name, cls) {
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

/* ---------------- Render ---------------- */
function render() {
  const app = document.getElementById('app');
  let html;
  if (state.view === 'selection') html = renderSelection();
  else if (state.view === 'picker') html = renderPicker();
  else if (state.view === 'practice' && state.isCustomReview) html = renderCustomReviewScreen();
  else html = renderLesson();
  app.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function renderSelection() {
  // Kick off the index fetch the first time we land here (no-op if already loaded/loading)
  loadLessonIndex();

  if (state.loadingIndex && !state.lessonIndex) {
    return renderLoadingScreen('课程列表加载中...');
  }
  if (state.loadError && !state.lessonIndex) {
    return renderErrorScreen(state.loadError, 'loadLessonIndex()');
  }

  const palette = [
    { bg: 'bg-rose-200',    hover: 'hover:bg-rose-300',    text: 'text-rose-900' },
    { bg: 'bg-amber-200',   hover: 'hover:bg-amber-300',   text: 'text-amber-900' },
    { bg: 'bg-lime-200',    hover: 'hover:bg-lime-300',    text: 'text-lime-900' },
    { bg: 'bg-teal-200',    hover: 'hover:bg-teal-300',    text: 'text-teal-900' },
    { bg: 'bg-sky-200',     hover: 'hover:bg-sky-300',     text: 'text-sky-900' },
    { bg: 'bg-violet-200',  hover: 'hover:bg-violet-300',  text: 'text-violet-900' },
    { bg: 'bg-fuchsia-200', hover: 'hover:bg-fuchsia-300', text: 'text-fuchsia-900' },
  ];
  const cards = state.lessonIndex.map((lesson, i) => {
    const c = palette[i % palette.length];
    return `
    <button onclick="selectLesson(${lesson.id})" class="${c.bg} ${c.hover} ${c.text} aspect-square rounded-3xl shadow-sm hover:shadow-md hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center">
      <span class="text-xl font-black tracking-tight">第 ${lesson.id} 课</span>
    </button>
  `;
  }).join('');

  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 flex items-center justify-center p-6">
    <div class="max-w-3xl w-full">
      <header class="text-center mb-10">
        <h1 class="text-4xl font-black text-violet-900 mb-3 tracking-tight">华文学习平台</h1>
        <p class="text-violet-400 font-medium">请选择课次开始学习</p>
      </header>
      <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-4 mb-4">${cards}</div>
      <button onclick="openPicker()" class="w-full bg-white border-2 border-dashed border-violet-300 text-violet-600 rounded-3xl py-6 shadow-sm hover:shadow-md hover:-translate-y-1 hover:bg-violet-50 active:scale-95 transition-all flex items-center justify-center gap-3">
        ${icon('shuffle', 'w-6 h-6')}
        <span class="text-lg font-black tracking-tight">自由复习（自选课次）</span>
      </button>
    </div>
  </div>`;
}

function renderLoadingScreen(message) {
  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 flex items-center justify-center p-6">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-violet-200 border-t-violet-500 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-violet-400 font-bold">${message}</p>
    </div>
  </div>`;
}

function renderErrorScreen(message, retryFnCall) {
  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 flex items-center justify-center p-6">
    <div class="text-center max-w-sm">
      <p class="text-rose-500 font-bold mb-4">${message}</p>
      <button onclick="${retryFnCall}" class="px-6 py-3 bg-violet-400 text-white rounded-2xl font-black text-sm hover:bg-violet-500 transition-all">重试</button>
      <button onclick="goSelection()" class="block mt-3 mx-auto text-violet-400 text-sm font-bold hover:text-violet-600">返回选择课次</button>
    </div>
  </div>`;
}

function renderPicker() {
  loadLessonIndex(); // no-op if already loaded/loading

  if (state.loadingIndex && !state.lessonIndex) return renderLoadingScreen('课程列表加载中...');
  if (state.loadError && !state.lessonIndex) return renderErrorScreen(state.loadError, 'loadLessonIndex()');
  if (!state.lessonIndex) return renderLoadingScreen('课程列表加载中...');

  const allIds = state.lessonIndex.map(l => l.id);
  const allSelected = allIds.length > 0 && allIds.every(id => state.pickerSelectedIds.includes(id));
  const count = state.pickerSelectedIds.length;

  const items = state.lessonIndex.map(lesson => {
    const checked = state.pickerSelectedIds.includes(lesson.id);
    return `
    <button onclick="togglePickerLesson(${lesson.id})" class="w-full flex items-center justify-between px-5 py-4 rounded-2xl border-2 transition-all text-left ${checked ? 'bg-violet-100 border-violet-400' : 'bg-white border-violet-50 hover:border-violet-200'}">
      <span class="font-bold text-violet-800">${lesson.title}</span>
      <span class="w-6 h-6 shrink-0 rounded-full border-2 flex items-center justify-center ${checked ? 'bg-violet-500 border-violet-500' : 'border-violet-200'}">
        ${checked ? icon('check', 'w-4 h-4 text-white') : ''}
      </span>
    </button>`;
  }).join('');

  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 p-4 md:p-8">
    <div class="max-w-xl mx-auto">
      <header class="mb-6 flex items-center gap-4">
        <button onclick="goSelection()" class="p-2 bg-white hover:bg-violet-50 rounded-lg text-violet-400 shadow-sm">${icon('home','w-5 h-5')}</button>
        <h1 class="text-2xl font-black text-violet-900 tracking-tight">选择要复习的课次</h1>
      </header>
      <div class="flex justify-between items-center mb-4">
        <p class="text-violet-400 font-bold text-sm">${count > 0 ? `已选 ${count} 课` : '请选择至少一课'}</p>
        <button onclick="togglePickerAll()" class="text-violet-500 font-black text-xs tracking-widest uppercase hover:text-violet-700">${allSelected ? '取消全选' : '全选'}</button>
      </div>
      <div class="flex flex-col gap-3 mb-8 max-h-[50vh] overflow-y-auto pr-1">${items}</div>
      <button onclick="startCustomReview()" ${count === 0 ? 'disabled' : ''} class="w-full py-4 rounded-2xl font-black uppercase text-sm tracking-widest transition-all ${count === 0 ? 'bg-violet-100 text-violet-300 cursor-not-allowed' : 'bg-violet-500 text-white shadow-md hover:bg-violet-600'}">
        开始听写练习（随机 ${REVIEW_VOCAB_COUNT} 词语 + ${REVIEW_SENTENCE_COUNT} 句子）
      </button>
    </div>
  </div>`;
}

function renderCustomReviewScreen() {
  const missingIds = state.pickerSelectedIds.filter(id => !state.lessonCache[id]);
  if (missingIds.length > 0 && !state.loadError) return renderLoadingScreen('正在准备练习内容...');
  if (missingIds.length > 0 && state.loadError) return renderErrorScreen(state.loadError, 'startCustomReview()');

  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 p-4 md:p-8 select-none">
    <div class="max-w-2xl mx-auto">
      <header class="mb-6 flex items-center gap-4 bg-white/80 backdrop-blur p-4 rounded-2xl shadow-sm border border-violet-100">
        <button onclick="goSelection()" class="p-2 hover:bg-violet-50 rounded-lg text-violet-300">${icon('home','w-5 h-5')}</button>
        <h1 class="text-xl font-black text-violet-800 uppercase tracking-tight">自由复习</h1>
      </header>
      ${renderPractice()}
    </div>
    <style>
      .perspective-1000 { perspective: 1000px; }
      .backface-hidden { backface-visibility: hidden; }
    </style>
  </div>`;
}

function renderLesson() {
  const L = activeLessonData();

  if (state.loadingLesson && !L) return renderLoadingScreen('课程加载中...');
  if (state.loadError && !L) return renderErrorScreen(state.loadError, `loadLesson(${state.currentLesson})`);
  if (!L) return renderLoadingScreen('课程加载中...'); // fallback safety net

  return `
  <div class="min-h-screen bg-gradient-to-br from-violet-50 via-rose-50 to-sky-50 p-4 md:p-8 select-none">
    <div class="max-w-2xl mx-auto">
      <header class="mb-6 flex flex-col md:flex-row justify-between items-center gap-4 bg-white/80 backdrop-blur p-4 rounded-2xl shadow-sm border border-violet-100">
        <div class="flex items-center gap-4">
          <button onclick="goSelection()" class="p-2 hover:bg-violet-50 rounded-lg text-violet-300">${icon('home','w-5 h-5')}</button>
          <h1 class="text-xl font-black text-violet-800 uppercase tracking-tight">${L.title}</h1>
        </div>
        <div class="flex bg-violet-50 p-1 rounded-xl">
          <button onclick="goLearn()" class="px-6 py-2 rounded-lg font-bold text-sm transition-all ${state.view === 'learn' ? 'bg-white text-violet-600 shadow-sm' : 'text-violet-300'}">学习</button>
          <button onclick="startPractice()" class="px-6 py-2 rounded-lg font-bold text-sm transition-all ${state.view === 'practice' ? 'bg-white text-violet-600 shadow-sm' : 'text-violet-300'}">听写练习</button>
        </div>
      </header>
      ${state.view === 'learn' ? renderLearn(L) : renderPractice()}
    </div>
    <style>
      .perspective-1000 { perspective: 1000px; }
      .backface-hidden { backface-visibility: hidden; }
    </style>
  </div>`;
}

function renderLearn(L) {
  const tabs = `
    <div class="flex gap-4 mb-6">
      <button onclick="setSubTab('vocab')" class="flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl border-2 transition-all ${state.subTab === 'vocab' ? 'bg-amber-100 border-amber-300 text-amber-700' : 'bg-white border-transparent text-slate-400'}">
        ${icon('book-open','w-5 h-5')}<span class="font-black tracking-widest">学词语</span>
      </button>
      <button onclick="setSubTab('sentence')" class="flex-1 flex items-center justify-center gap-2 py-4 rounded-2xl border-2 transition-all ${state.subTab === 'sentence' ? 'bg-sky-100 border-sky-300 text-sky-700' : 'bg-white border-transparent text-slate-400'}">
        ${icon('gamepad-2','w-5 h-5')}<span class="font-black tracking-widest">学默写</span>
      </button>
    </div>`;

  const body = state.subTab === 'vocab' ? renderVocabCard(L) : renderSentenceGame(L);
  const total = state.subTab === 'vocab' ? L.vocab.length : L.sentences.length;

  const nav = `
    <div class="flex justify-between items-center mt-12">
      <button onclick="handlePrev()" class="w-16 h-16 flex items-center justify-center bg-white rounded-full shadow-md text-violet-400 hover:scale-110 transition-all border border-violet-100">${icon('chevron-left','w-8 h-8')}</button>
      <p class="font-black text-violet-300 tracking-[0.3em] uppercase text-xs">${state.currentIndex + 1} / ${total}</p>
      <button onclick="handleNext()" class="w-16 h-16 flex items-center justify-center bg-white rounded-full shadow-md text-violet-400 hover:scale-110 transition-all border border-violet-100">${icon('chevron-right','w-8 h-8')}</button>
    </div>`;

  return `${tabs}<div class="min-h-[500px]">${body}${nav}</div>`;
}

function renderVocabCard(L) {
  const item = L.vocab[state.currentIndex];
  return `
  <div class="flex flex-col items-center">
    <div onclick="toggleFlip()" class="w-full max-w-sm aspect-[4/5] cursor-pointer perspective-1000 relative">
      <div class="flip-inner ${state.isFlipped ? 'flipped' : ''}" style="width:100%;height:100%;">
        <div class="flip-face backface-hidden bg-white rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-12 border-b-[12px] border-amber-100">
          <span class="text-8xl font-black text-violet-900 tracking-tighter">${item.word}</span>
          <p class="absolute bottom-12 text-violet-200 font-black text-[10px] tracking-[0.4em] uppercase">点击查看详情</p>
        </div>
        <div class="flip-face flip-back backface-hidden bg-amber-50 rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-10 border-b-[12px] border-amber-300">
          <div class="text-center mb-8">
            <h3 class="text-5xl font-black text-violet-900 mb-2">${item.word}</h3>
            <p class="text-2xl text-amber-500 font-bold">${item.pinyin}</p>
            <p class="text-xl text-violet-400 italic mt-2">${item.meaning}</p>
          </div>
          <div class="w-full h-px bg-amber-200 mb-8"></div>
          <div class="bg-white/90 p-6 rounded-3xl w-full text-center relative">
            ${item.example ? `<p class="text-xl font-bold text-violet-700 leading-relaxed mb-6">${item.example}</p>` : ''}
            <button onclick="event.stopPropagation(); speakText('${(item.example || item.word).replace(/'/g, "\\'")}', this)" class="p-3 rounded-full bg-amber-100 text-amber-600 hover:bg-amber-200 transition-all">${icon('volume-2','w-6 h-6')}</button>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function renderSentenceGame(L) {
  const s = L.sentences[state.currentIndex];
  const userChips = state.userSelection.map(w => `<span class="px-4 py-2 bg-sky-400 text-white rounded-xl shadow-sm font-bold text-xl">${w}</span>`).join('');
  const options = state.gameSelection.map((w, idx) => `<button onclick="pickSegment('${w.replace(/'/g,"\\'")}', ${idx})" class="px-5 py-3 bg-white border-2 border-sky-100 hover:border-sky-400 hover:text-sky-600 rounded-2xl transition-all font-black text-2xl shadow-sm active:scale-90">${w}</button>`).join('');

  return `
  <div class="bg-white rounded-[3rem] shadow-lg p-10 border-b-[12px] border-sky-100">
    <div class="flex flex-col items-center mb-8">
      <div class="p-8 bg-sky-50 rounded-full mb-6 ring-8 ring-sky-50/50">${icon(s.icon, 'w-16 h-16 ' + s.color)}</div>
      <p class="text-sky-300 text-[10px] font-black tracking-[0.4em] mb-2 uppercase">场景</p>
      <p class="text-violet-500 text-center text-lg font-bold italic px-4">${s.description}</p>
    </div>
    <div class="min-h-[120px] mb-8 p-6 bg-sky-50 rounded-[2rem] border-4 border-dashed border-sky-200 flex flex-wrap gap-2 items-center justify-center">${userChips}</div>
    <div class="flex flex-wrap gap-3 justify-center mb-10">${options}</div>
    <div class="flex justify-between items-center pt-8 border-t border-sky-100">
      <button onclick="resetLearnSentence()" class="text-violet-300 hover:text-sky-600 flex items-center gap-2 font-black text-xs tracking-widest">${icon('rotate-cw','w-4 h-4')} 重置</button>
      <button onclick="toggleFlip()" class="text-sky-500 font-black text-xs tracking-widest border-2 border-sky-400 px-4 py-2 rounded-full hover:bg-sky-400 hover:text-white transition-all uppercase">${state.isFlipped ? '隐藏答案' : '显示答案'}</button>
    </div>
    ${state.isFlipped ? `
    <div class="mt-8 flex flex-col items-center gap-4 animate-in">
      <p class="text-center text-3xl font-black text-sky-600 leading-relaxed">${s.text}</p>
      <button onclick="speakText('${s.text.replace(/'/g,"\\'")}', this)" class="p-3 rounded-full bg-sky-100 text-sky-600 hover:bg-sky-200 transition-all">${icon('volume-2','w-6 h-6')}</button>
    </div>` : ''}
  </div>`;
}

function renderPractice() {
  if (state.isPracticeComplete) {
    return `
    <div class="flex flex-col items-center min-h-[550px]">
      <div class="w-full bg-white rounded-[3rem] p-16 text-center shadow-lg flex flex-col items-center border-b-[12px] border-emerald-100">
        <div class="w-32 h-32 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mb-8">${icon('check','w-16 h-16')}</div>
        <h2 class="text-4xl font-black text-violet-900 mb-4 tracking-tighter">练习完成!</h2>
        <p class="text-violet-400 font-bold mb-10 text-lg">${state.isCustomReview ? '做得好! 你已经完成了这次自由复习。' : `做得好! 你已经掌握了第 ${state.currentLesson} 课。`}</p>
        <div class="flex gap-4">
          <button onclick="goSelection()" class="px-8 py-4 bg-violet-50 text-violet-600 rounded-2xl font-black uppercase text-sm tracking-widest hover:bg-violet-100 transition-all">选择课次</button>
          <button onclick="${state.isCustomReview ? 'startCustomReview()' : 'startPractice()'}" class="px-8 py-4 bg-violet-400 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-md hover:bg-violet-500 transition-all">重新开始</button>
        </div>
      </div>
    </div>`;
  }

  const item = state.practiceQueue[state.currentIndex];
  const front = state.practicePhase === 'tingxie'
    ? `<div class="text-center">
         <p class="text-5xl font-black text-violet-500 mb-4 tracking-tight">${item?.pinyin || ''}</p>
         <p class="text-2xl text-violet-300 italic font-bold">${item?.meaning || ''}</p>
       </div>`
    : `<div class="flex flex-col items-center text-center">
         <div class="p-8 bg-violet-50 rounded-full mb-8 ring-8 ring-violet-50">${icon(item?.icon, 'w-16 h-16 ' + (item?.color || ''))}</div>
         <p class="text-xl text-violet-600 font-black tracking-tight leading-snug">${item?.description || ''}</p>
       </div>`;
  const back = state.practicePhase === 'tingxie'
    ? `<span class="text-white font-black leading-tight text-center text-9xl tracking-tighter">${item?.word || ''}</span>`
    : `<span class="text-white font-black leading-tight text-center text-4xl">${item?.text || ''}</span>`;

  return `
  <div class="flex flex-col items-center min-h-[550px]">
    <div class="w-full mb-8 flex justify-between items-end">
      <div>
        <span class="text-[10px] font-black text-violet-300 uppercase tracking-[0.4em] block mb-1">练习阶段</span>
        <h2 class="text-3xl font-black text-violet-900">${state.practicePhase === 'tingxie' ? '听写测试' : '默写测试'}</h2>
      </div>
      <div class="bg-violet-50 px-4 py-2 rounded-2xl">
        <span class="text-[10px] font-black text-violet-300 uppercase tracking-widest block text-right mb-1">进度</span>
        <p class="text-2xl font-black text-violet-500">${state.currentIndex + 1} / ${state.practiceQueue.length}</p>
      </div>
    </div>

    <div onclick="toggleFlip()" class="w-full max-w-sm aspect-[4/5] cursor-pointer perspective-1000 relative">
      <div class="flip-inner ${state.isFlipped ? 'flipped' : ''}" style="width:100%;height:100%;">
        <div class="flip-face backface-hidden bg-white rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-12 border-b-[12px] border-amber-100">
          ${front}
          <p class="absolute bottom-12 text-violet-200 font-black text-[10px] tracking-[0.4em] uppercase">点击查看答案</p>
        </div>
        <div class="flip-face flip-back backface-hidden bg-violet-400 rounded-[3rem] shadow-lg flex flex-col items-center justify-center p-12 border-b-[12px] border-violet-500">
          ${back}
        </div>
      </div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-6 mt-12">
      <button onclick="event.stopPropagation(); handlePracticeMissed()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl border-b-8 border-rose-100 text-rose-400 hover:bg-rose-50 transition-all group active:scale-95">
        ${icon('x','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记错了</span>
      </button>
      <button onclick="event.stopPropagation(); handlePracticeCorrect()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl border-b-8 border-emerald-100 text-emerald-500 hover:bg-emerald-50 transition-all group active:scale-95">
        ${icon('check','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记住了</span>
      </button>
    </div>
  </div>`;
}

/* ---------------- Init ---------------- */
render();
</script>
</body>
</html>
