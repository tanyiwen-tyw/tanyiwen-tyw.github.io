  .flip-inner { transition: transform 0.5s; transform-style: preserve-3d; position: relative; }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-face { position: absolute; inset: 0; }
  .flip-back { transform: rotateY(180deg); }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(1rem); } to { opacity: 1; transform: translateY(0); } }

<script>
/* ---------------- Audio utilities: browser-native Chinese TTS (no API key needed) ---------------- */
let cachedVoices = [];
function loadVoices() {
  cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
}
if (window.speechSynthesis) {
  loadVoices();
  // Voice list loads asynchronously in some browsers (esp. Chrome)
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function pickChineseVoice() {
  if (!cachedVoices.length) loadVoices();
  // Prefer Mandarin (zh-CN), fall back to any zh-* voice
  return cachedVoices.find(v => v.lang === 'zh-CN')
      || cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('zh'))
      || null;
}

function speakText(text, btn) {
  if (!text) return;
  if (!window.speechSynthesis) {
    console.error("Speech synthesis not supported in this browser.");
    return;
  }
  window.speechSynthesis.cancel(); // stop anything currently speaking
  const utterance = new SpeechSynthesisUtterance(text);
  const voice = pickChineseVoice();
  if (voice) utterance.voice = voice;
  utterance.lang = 'zh-CN';
  utterance.rate = 0.9;

  if (btn) {
    btn.classList.add('animate-pulse');
    utterance.onend = () => btn.classList.remove('animate-pulse');
    utterance.onerror = () => btn.classList.remove('animate-pulse');
  }
  window.speechSynthesis.speak(utterance);
}

function playSound(type) {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!AudioContext) return;
  const ctx = new AudioContext();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  const now = ctx.currentTime;
  switch (type) {
    case 'flip':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'correct':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, now);
      osc.frequency.exponentialRampToValueAtTime(1320, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
      osc.start(now); osc.stop(now + 0.4);
      break;
    case 'missed':
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.linearRampToValueAtTime(50, now + 0.2);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
  }
}

/* ---------------- State ---------------- */
const state = {
  currentLesson: null,
  view: 'selection',      // 'selection' | 'learn' | 'practice'
  subTab: 'vocab',         // 'vocab' | 'sentence'
  currentIndex: 0,
  isFlipped: false,
  isTransitioning: false,
  practiceQueue: [],
  practicePhase: 'tingxie', // 'tingxie' | 'moxie'
  isPracticeComplete: false,
  gameSelection: [],
  userSelection: []
};

function activeLessonData() { return state.currentLesson ? DATA[state.currentLesson] : null; }
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

/* ---------------- Navigation / actions ---------------- */
function goSelection() { state.view = 'selection'; playSound('flip'); render(); }

function selectLesson(num) {
  state.currentLesson = num;
  state.view = 'learn';
  state.subTab = 'vocab';
  state.currentIndex = 0;
  state.isFlipped = false;
  playSound('flip');
  render();
}

function goLearn() {
  state.view = 'learn';
  playSound('flip');
  render();
}

function setSubTab(tab) {
  state.subTab = tab;
  state.currentIndex = 0;
  state.isFlipped = false;
  playSound('flip');
  if (tab === 'sentence') setupSentenceGame();
  render();
}

function toggleFlip() {
  if (state.isTransitioning) return;
  state.isFlipped = !state.isFlipped;
  playSound('flip');
  render();
  maybeAutoSpeak();
}

function handleNext() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex + 1) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

function handlePrev() {
  const data = state.subTab === 'vocab' ? activeLessonData().vocab : activeLessonData().sentences;
  state.currentIndex = (state.currentIndex - 1 + data.length) % data.length;
  state.isFlipped = false;
  playSound('flip');
  if (state.subTab === 'sentence') setupSentenceGame();
  render();
}

function setupSentenceGame() {
  const sentence = activeLessonData().sentences[state.currentIndex];
  const punctuation = new Set(['。', '，', '：', '！', '？', '“', '”', '、', '；']);
  state.gameSelection = shuffle(sentence.segments.filter(s => !punctuation.has(s)));
  state.userSelection = [];
}

function resetLearnSentence() {
  setupSentenceGame();
  playSound('flip');
  render();
}

function pickSegment(word, idx) {
  state.userSelection = [...state.userSelection, word];
  state.gameSelection = state.gameSelection.filter((w, i) => !(w === word && i === idx));
  playSound('flip');
  render();
}

/* ---------------- Practice mode ---------------- */
function startPractice() {
  const vocab = shuffle(activeLessonData().vocab).map(item => ({ ...item, type: 'vocab' }));
  state.practiceQueue = vocab;
  state.practicePhase = 'tingxie';
  state.currentIndex = 0;
  state.isFlipped = false;
  state.isPracticeComplete = false;
  state.view = 'practice';
  playSound('flip');
  render();
  maybeAutoSpeak();
}

function startSentencePractice() {
  state.practiceQueue = activeLessonData().sentences.map(item => ({ ...item, type: 'sentence' }));
  state.practicePhase = 'moxie';
  state.currentIndex = 0;
  state.isFlipped = false;
}

function moveNextInPractice(onPhaseEnd) {
  const advance = () => {
    if (state.currentIndex < state.practiceQueue.length - 1) {
      state.currentIndex += 1;
    } else {
      onPhaseEnd();
    }
    state.isTransitioning = false;
    render();
    maybeAutoSpeak();
  };
  if (state.isFlipped) {
    state.isFlipped = false;
    state.isTransitioning = true;
    render();
    setTimeout(advance, 500);
  } else {
    advance();
  }
}

function handlePracticeCorrect() {
  playSound('correct');
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') startSentencePractice();
    else state.isPracticeComplete = true;
  });
}

function handlePracticeMissed() {
  playSound('missed');
  const currentItem = state.practiceQueue[state.currentIndex];
  state.practiceQueue = [...state.practiceQueue, currentItem];
  moveNextInPractice(() => {
    if (state.practicePhase === 'tingxie') startSentencePractice();
    else state.isPracticeComplete = true;
  });
}

function maybeAutoSpeak() {
  if (state.view === 'practice' && state.practicePhase === 'tingxie' &&
      state.practiceQueue[state.currentIndex] && !state.isFlipped && !state.isTransitioning) {
    speakText(state.practiceQueue[state.currentIndex].word);
  }
}

/* ---------------- Icon helper ---------------- */
function icon(name, cls) {
  return `<i data-lucide="${name}" class="${cls}"></i>`;
}

  const app = document.getElementById('app');
  app.innerHTML = state.view === 'selection' ? renderSelection() : renderLesson();
  if (window.lucide) lucide.createIcons();
}

    </div>
    <div class="min-h-[120px] mb-8 p-6 bg-slate-50 rounded-[2rem] border-4 border-dashed border-slate-200 flex flex-wrap gap-2 items-center justify-center">${userChips}</div>
    <div class="flex flex-wrap gap-3 justify-center mb-10">${options}</div>
    <div class="flex justify-between items-center pt-8 border-t border-slate-100">
      <button onclick="resetLearnSentence()" class="text-slate-400 hover:text-indigo-600 flex items-center gap-2 font-black text-xs tracking-widest">${icon('rotate-cw','w-4 h-4')} 重置</button>
      <button onclick="toggleFlip()" class="text-indigo-600 font-black text-xs tracking-widest border-2 border-indigo-600 px-4 py-2 rounded-full hover:bg-indigo-600 hover:text-white transition-all uppercase">${state.isFlipped ? '隐藏答案' : '显示答案'}</button>
    </div>
    ${state.isFlipped ? `
    <div class="mt-8 flex flex-col items-center gap-4 animate-in">
      <p class="text-center text-3xl font-black text-indigo-700 leading-relaxed">${s.text}</p>
      <button onclick="speakText('${s.text.replace(/'/g,"\\'")}', this)" class="p-3 rounded-full bg-indigo-100 text-indigo-600 hover:bg-indigo-200 transition-all">${icon('volume-2','w-6 h-6')}</button>
    </div>` : ''}
  </div>`;
}

function renderPractice() {
  if (state.isPracticeComplete) {
    return `
    <div class="flex flex-col items-center min-h-[550px]">
      <div class="w-full bg-white rounded-[3rem] p-16 text-center shadow-2xl flex flex-col items-center border-b-[12px] border-slate-100">
        <div class="w-32 h-32 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-8">${icon('check','w-16 h-16')}</div>
        <h2 class="text-4xl font-black text-slate-800 mb-4 tracking-tighter">练习完成!</h2>
        <p class="text-slate-500 font-bold mb-10 text-lg">做得好! 你已经掌握了第 ${state.currentLesson} 课。</p>
        <div class="flex gap-4">
          <button onclick="goSelection()" class="px-8 py-4 bg-slate-100 text-slate-700 rounded-2xl font-black uppercase text-sm tracking-widest hover:bg-slate-200 transition-all">选择课次</button>
          <button onclick="startPractice()" class="px-8 py-4 bg-indigo-600 text-white rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">重新开始</button>
        </div>
      </div>
    </div>`;
  }

  const item = state.practiceQueue[state.currentIndex];
  const front = state.practicePhase === 'tingxie'
    ? `<div class="text-center">
         <p class="text-5xl font-black text-indigo-600 mb-4 tracking-tight">${item?.pinyin || ''}</p>
         <p class="text-2xl text-slate-400 italic font-bold">${item?.meaning || ''}</p>
       </div>`
    : `<div class="flex flex-col items-center text-center">
         <div class="p-8 bg-slate-50 rounded-full mb-8 ring-8 ring-indigo-50">${icon(item?.icon, 'w-16 h-16 ' + (item?.color || ''))}</div>
         <p class="text-xl text-slate-600 font-black tracking-tight leading-snug">${item?.description || ''}</p>
       </div>`;
  const back = state.practicePhase === 'tingxie'
    ? `<span class="text-white font-black leading-tight text-center text-9xl tracking-tighter">${item?.word || ''}</span>`
    : `<span class="text-white font-black leading-tight text-center text-4xl">${item?.text || ''}</span>`;

  return `
  <div class="flex flex-col items-center min-h-[550px]">
    <div class="w-full mb-8 flex justify-between items-end">
      <div>
        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-[0.4em] block mb-1">练习阶段</span>
        <h2 class="text-3xl font-black text-slate-800">${state.practicePhase === 'tingxie' ? '听写测试' : '默写测试'}</h2>
      </div>
      <div class="bg-indigo-50 px-4 py-2 rounded-2xl">
        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest block text-right mb-1">进度</span>
        <p class="text-2xl font-black text-indigo-600">${state.currentIndex + 1} / ${state.practiceQueue.length}</p>
      </div>
    </div>

    <div onclick="toggleFlip()" class="w-full max-w-sm aspect-[4/5] cursor-pointer perspective-1000 relative">
      <div class="flip-inner ${state.isFlipped ? 'flipped' : ''}" style="width:100%;height:100%;">
        <div class="flip-face backface-hidden bg-white rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-12 border-b-[12px] border-amber-100">
          ${front}
          <p class="absolute bottom-12 text-slate-300 font-black text-[10px] tracking-[0.4em] uppercase">点击查看答案</p>
        </div>
        <div class="flip-face flip-back backface-hidden bg-indigo-700 rounded-[3rem] shadow-2xl flex flex-col items-center justify-center p-12 border-b-[12px] border-indigo-950">
          ${back}
        </div>
      </div>
    </div>

    <div class="w-full max-w-sm grid grid-cols-2 gap-6 mt-12">
      <button onclick="event.stopPropagation(); handlePracticeMissed()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl border-b-8 border-red-50 text-red-500 hover:bg-red-50 transition-all group active:scale-95">
        ${icon('x','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记错了</span>
      </button>
      <button onclick="event.stopPropagation(); handlePracticeCorrect()" class="flex flex-col items-center justify-center py-6 bg-white rounded-3xl border-b-8 border-green-50 text-green-600 hover:bg-green-50 transition-all group active:scale-95">
        ${icon('check','w-10 h-10 mb-2 group-hover:scale-125 transition-transform')}
        <span class="font-black text-xs tracking-widest uppercase">记住了</span>
      </button>
    </div>
  </div>`;
}

/* ---------------- Init ---------------- */
render();
</script>
</body>
</html>
